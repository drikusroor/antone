<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antone — Tone Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c0a09;
    --surface: #1a1614;
    --surface-raised: #231f1b;
    --border: #3d3229;
    --amber: #f59e0b;
    --amber-dim: #92610a;
    --amber-glow: rgba(245, 158, 11, 0.15);
    --amber-bright: #fbbf24;
    --text: #e7e0d8;
    --text-dim: #8a7e72;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-display: 'Instrument Serif', serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, rgba(245, 158, 11, 0.03) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: min(560px, 92vw);
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  header {
    text-align: center;
    padding-bottom: 8px;
  }

  header h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 2.4rem;
    letter-spacing: 0.04em;
    color: var(--amber);
    text-shadow: 0 0 40px rgba(245, 158, 11, 0.25);
    line-height: 1;
  }

  header p {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* Visualizer */
  .viz-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2px;
    position: relative;
    overflow: hidden;
  }

  .viz-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    pointer-events: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }

  canvas {
    display: block;
    width: 100%;
    height: 160px;
    border-radius: 10px;
  }

  /* Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-dim);
  }

  /* Frequency display */
  .freq-display {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .freq-display input[type="number"] {
    font-family: var(--font-mono);
    font-size: 2rem;
    font-weight: 600;
    color: var(--amber);
    background: transparent;
    border: none;
    outline: none;
    width: 6ch;
    text-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
    -moz-appearance: textfield;
  }

  .freq-display input[type="number"]::-webkit-inner-spin-button,
  .freq-display input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
  }

  .freq-display .unit {
    font-size: 0.85rem;
    color: var(--text-dim);
    font-weight: 400;
  }

  .freq-display .note-name {
    font-family: var(--font-display);
    font-size: 1.3rem;
    color: var(--amber-dim);
    margin-left: auto;
    min-width: 3ch;
    text-align: right;
  }

  /* Slider */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    background: var(--surface-raised);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
    position: relative;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 12px rgba(245, 158, 11, 0.4), 0 2px 6px rgba(0,0,0,0.5);
    cursor: grab;
    transition: box-shadow 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:active {
    cursor: grabbing;
    box-shadow: 0 0 24px rgba(245, 158, 11, 0.6), 0 2px 6px rgba(0,0,0,0.5);
  }

  input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--amber);
    border: none;
    box-shadow: 0 0 12px rgba(245, 158, 11, 0.4), 0 2px 6px rgba(0,0,0,0.5);
    cursor: grab;
  }

  .range-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--text-dim);
    margin-top: 2px;
    opacity: 0.6;
  }

  /* Waveform buttons */
  .wave-options {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .wave-btn {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 12px 0;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .wave-btn svg {
    width: 32px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
  }

  .wave-btn:hover {
    border-color: var(--amber-dim);
    color: var(--text);
  }

  .wave-btn.active {
    background: var(--amber-glow);
    border-color: var(--amber);
    color: var(--amber);
    box-shadow: 0 0 16px rgba(245, 158, 11, 0.1);
  }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .volume-row label {
    flex-shrink: 0;
  }

  .volume-row input[type="range"] {
    flex: 1;
  }

  .volume-val {
    font-size: 0.75rem;
    color: var(--text-dim);
    min-width: 3ch;
    text-align: right;
  }

  /* Play button */
  .play-btn {
    width: 100%;
    padding: 16px;
    border: 1px solid var(--amber-dim);
    border-radius: 10px;
    background: transparent;
    color: var(--amber);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .play-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.08), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .play-btn:hover::before { opacity: 1; }

  .play-btn:hover {
    border-color: var(--amber);
    box-shadow: 0 0 24px rgba(245, 158, 11, 0.15);
  }

  .play-btn.playing {
    background: var(--amber);
    color: var(--bg);
    border-color: var(--amber);
    box-shadow: 0 0 32px rgba(245, 158, 11, 0.3);
  }

  .play-btn.playing::before { display: none; }

  /* Footer */
  footer {
    text-align: center;
    font-size: 0.6rem;
    color: var(--text-dim);
    opacity: 0.5;
    letter-spacing: 0.1em;
  }

  /* Entry animation */
  .container > * {
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.5s ease forwards;
  }
  .container > *:nth-child(1) { animation-delay: 0.05s; }
  .container > *:nth-child(2) { animation-delay: 0.12s; }
  .container > *:nth-child(3) { animation-delay: 0.2s; }
  .container > *:nth-child(4) { animation-delay: 0.28s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Antone</h1>
    <p>Tone Generator</p>
  </header>

  <div class="viz-wrap">
    <canvas id="viz"></canvas>
  </div>

  <div class="panel">
    <div class="control-group">
      <label>Frequency</label>
      <div class="freq-display">
        <input type="number" id="freqNum" value="440" min="20" max="20000" step="1">
        <span class="unit">Hz</span>
        <span class="note-name" id="noteName">A4</span>
      </div>
      <input type="range" id="freqSlider" min="0" max="1" value="0.4394" step="0.0001">
      <div class="range-labels"><span>20 Hz</span><span>20 kHz</span></div>
    </div>

    <div class="control-group">
      <label>Waveform</label>
      <div class="wave-options">
        <button class="wave-btn active" data-wave="sine">
          <svg viewBox="0 0 32 18"><path d="M1 9 C6 1, 10 1, 16 9 S26 17, 31 9"/></svg>
          Sine
        </button>
        <button class="wave-btn" data-wave="square">
          <svg viewBox="0 0 32 18"><path d="M1 17 V1 H16 V17 H31 V1"/></svg>
          Square
        </button>
        <button class="wave-btn" data-wave="sawtooth">
          <svg viewBox="0 0 32 18"><path d="M1 17 L16 1 V17 L31 1"/></svg>
          Saw
        </button>
        <button class="wave-btn" data-wave="triangle">
          <svg viewBox="0 0 32 18"><path d="M1 9 L8 1 L24 17 L31 9"/></svg>
          Triangle
        </button>
      </div>
    </div>

    <div class="control-group">
      <div class="volume-row">
        <label>Volume</label>
        <input type="range" id="volume" min="0" max="100" value="50">
        <span class="volume-val" id="volVal">50%</span>
      </div>
    </div>

    <button class="play-btn" id="playBtn">Start</button>
  </div>

  <footer>Made by <a href="https://studioroor.com" style="color:var(--amber-dim);text-decoration:none;border-bottom:1px solid var(--amber-dim);">Studio Roor</a> &middot; Web Audio API</footer>
</div>

<script>
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function freqToNote(freq) {
  const semitones = 12 * Math.log2(freq / 440);
  const midi = Math.round(69 + semitones);
  const name = NOTE_NAMES[((midi % 12) + 12) % 12];
  const octave = Math.floor(midi / 12) - 1;
  const cents = Math.round((69 + semitones - midi) * 100);
  const centsStr = cents === 0 ? '' : (cents > 0 ? `+${cents}` : `${cents}`);
  return `${name}${octave}${centsStr ? ' ' + centsStr + '¢' : ''}`;
}

let audioCtx = null;
let oscillator = null;
let gainNode = null;
let analyser = null;
let isPlaying = false;

const freqSlider = document.getElementById('freqSlider');
const freqNum = document.getElementById('freqNum');
const noteName = document.getElementById('noteName');
const playBtn = document.getElementById('playBtn');
const volumeSlider = document.getElementById('volume');
const volVal = document.getElementById('volVal');
const canvas = document.getElementById('viz');
const ctx = canvas.getContext('2d');
const waveBtns = document.querySelectorAll('.wave-btn');

let currentWave = 'sine';

const MIN_FREQ = 20;
const MAX_FREQ = 20000;
const LOG_MIN = Math.log(MIN_FREQ);
const LOG_MAX = Math.log(MAX_FREQ);

// Convert normalized slider position (0–1) to frequency (log scale)
function sliderToFreq(t) {
  return Math.round(Math.exp(LOG_MIN + t * (LOG_MAX - LOG_MIN)));
}

// Convert frequency to normalized slider position (0–1)
function freqToSlider(f) {
  return (Math.log(f) - LOG_MIN) / (LOG_MAX - LOG_MIN);
}

function setFreq(f) {
  f = Math.max(MIN_FREQ, Math.min(MAX_FREQ, f));
  freqNum.value = f;
  noteName.textContent = freqToNote(f);
  if (oscillator) oscillator.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.01);
}

freqSlider.addEventListener('input', () => {
  setFreq(sliderToFreq(parseFloat(freqSlider.value)));
});

freqNum.addEventListener('input', () => {
  let v = parseFloat(freqNum.value);
  if (!v || v < MIN_FREQ) v = MIN_FREQ;
  if (v > MAX_FREQ) v = MAX_FREQ;
  freqSlider.value = freqToSlider(v);
  setFreq(v);
});

volumeSlider.addEventListener('input', () => {
  const v = volumeSlider.value / 100;
  volVal.textContent = `${volumeSlider.value}%`;
  if (gainNode) gainNode.gain.setTargetAtTime(v, audioCtx.currentTime, 0.01);
});

waveBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    waveBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentWave = btn.dataset.wave;
    if (oscillator) oscillator.type = currentWave;
  });
});

function startAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  oscillator = audioCtx.createOscillator();
  gainNode = audioCtx.createGain();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;

  oscillator.type = currentWave;
  oscillator.frequency.value = parseFloat(freqNum.value) || 440;
  gainNode.gain.value = volumeSlider.value / 100;

  oscillator.connect(gainNode);
  gainNode.connect(analyser);
  analyser.connect(audioCtx.destination);
  oscillator.start();

  isPlaying = true;
  playBtn.textContent = 'Stop';
  playBtn.classList.add('playing');
  drawWave();
}

function stopAudio() {
  if (oscillator) {
    oscillator.stop();
    oscillator.disconnect();
    oscillator = null;
  }
  isPlaying = false;
  playBtn.textContent = 'Start';
  playBtn.classList.remove('playing');
}

playBtn.addEventListener('click', () => {
  isPlaying ? stopAudio() : startAudio();
});

// Visualizer
function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const dataArray = new Uint8Array(2048);

function drawWave() {
  if (!isPlaying) {
    // Draw flat line when stopped
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = 'rgba(245, 158, 11, 0.15)';
    ctx.lineWidth = 1.5 * devicePixelRatio;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height / 2);
    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
    return;
  }

  requestAnimationFrame(drawWave);
  analyser.getByteTimeDomainData(dataArray);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    const y = (canvas.height / 4) * i;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  // Glow layer
  ctx.strokeStyle = 'rgba(245, 158, 11, 0.15)';
  ctx.lineWidth = 8 * devicePixelRatio;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  const sliceWidth = canvas.width / dataArray.length;
  let x = 0;
  for (let i = 0; i < dataArray.length; i++) {
    const v = dataArray[i] / 128.0;
    const y = (v * canvas.height) / 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    x += sliceWidth;
  }
  ctx.stroke();

  // Main waveform
  ctx.strokeStyle = '#f59e0b';
  ctx.lineWidth = 2 * devicePixelRatio;
  ctx.beginPath();
  x = 0;
  for (let i = 0; i < dataArray.length; i++) {
    const v = dataArray[i] / 128.0;
    const y = (v * canvas.height) / 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    x += sliceWidth;
  }
  ctx.stroke();
}

// Draw idle state
drawWave();
noteName.textContent = freqToNote(parseFloat(freqNum.value));

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    isPlaying ? stopAudio() : startAudio();
  }
});
</script>

</body>
</html>
